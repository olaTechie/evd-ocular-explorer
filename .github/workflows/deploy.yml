name: Deploy to GitHub Pages

# NOTE: Keep the repository PRIVATE and GitHub Pages DISABLED until the parent
# article is accepted (see README → "Launch gating"). While Pages is disabled
# the deploy job simply fails harmlessly; enable Pages when you are ready to go live.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build   # runs the CSV→JSON step, then `next build` (static export to ./out)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
