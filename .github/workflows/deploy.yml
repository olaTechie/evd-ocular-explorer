name: Deploy to GitHub Pages

# On every push to main: build the static export and publish it to GitHub Pages.
# `configure-pages` (enablement: true) turns Pages on automatically the first time.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm run build   # prebuild runs CSV→JSON + thumbnails, then next build → ./out
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
